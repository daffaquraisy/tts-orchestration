services:

  redis:
    image: redis:7-alpine
    container_name: tts_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tts_api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      CONFIG_PATH: /app/config/voice_config.json
      AUDIO_OUTPUT_DIR: /tmp/tts_output
      LOG_LEVEL: info
    volumes:
      - ./config:/app/config:ro
      - tts_audio:/tmp/tts_output
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: tts_worker
    environment:
      REDIS_URL: redis://redis:6379
      CONFIG_PATH: /app/config/voice_config.json
      AUDIO_OUTPUT_DIR: /tmp/tts_output
    volumes:
      - ./config:/app/config:ro
      - tts_audio:/tmp/tts_output
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1

  rq-dashboard:
    image: eoranged/rq-dashboard:latest
    container_name: tts_rq_dashboard
    ports:
      - "9181:9181"
    environment:
      RQ_DASHBOARD_REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  tts_audio:

networks:
  default:
    name: tts_network
